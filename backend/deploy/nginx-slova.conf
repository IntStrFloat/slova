limit_req_zone $binary_remote_addr zone=slova_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name slova.193.160.208.95.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name slova.193.160.208.95.nip.io;

    ssl_certificate /etc/letsencrypt/live/slova.193.160.208.95.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slova.193.160.208.95.nip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location /api/ {
        limit_req zone=slova_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
    }

    location / {
        return 404;
    }
}
